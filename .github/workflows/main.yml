name: Anti-Zaglushka Smart Sync 99

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Merge
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. 袧邪褋褌褉芯泄泻懈
          SOURCE="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt"
          FLAGS=("馃嚭馃嚫" "馃嚛馃嚜" "馃嚝馃嚠" "馃嚨馃嚤" "馃嚦馃嚤" "馃嚞馃嚙" "馃嚝馃嚪" "馃嚢馃嚳" "馃嚬馃嚪" "馃嚫馃嚜" "馃嚘馃嚬" "馃嚚馃嚳")
          LIMIT=99

          # 2. 小芯褏褉邪薪褟械屑 褌胁芯懈 褌械泻褍褖懈械 褋械褉胁械褉邪 (VIP)
          touch README.md
          grep -E "^(vless|vmess|ss|trojan)://" README.md | grep -v "袗薪褌懈蟹邪谐谢褍褕泻邪" > my_vip.txt || touch my_vip.txt

          # 3. 小泻邪褔懈胁邪械屑 薪芯胁褘械 泻谢褞褔懈
          curl -L -s "$SOURCE" -o incoming.txt
          grep -E "^(vless|vmess|ss|trojan)://" incoming.txt | cut -d'#' -f1 | head -n $LIMIT > source_cleaned.txt

          # 4. 小芯斜懈褉邪械屑 薪芯胁褘泄 README.md 褋 褌胁芯懈屑懈 写邪薪薪褘屑懈
          echo "#subscription-userinfo: upload=1; download=1; total=1; expire=999999999999999" > README.md
          echo "#profile-title: 馃嚝馃嚪 饾悡饾悽饾悿 饾悡饾惃饾悿 饾悤饾悘饾悕" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce: 袝褋谢懈 VPN 薪械 褉邪斜芯褌邪械褌 薪邪卸屑懈褌械 馃攧 , 锌芯褋谢械 鈴憋笍 懈 胁褘斜械褉懈褌械 褋械褉胁械褉 褋 薪邪懈屑械薪褜褕懈屑 锌芯泻邪蟹邪褌械谢械屑 ms!" >> README.md
          echo "#support-url: https://wa.me/79639864491" >> README.md
          echo "#profile-web-page-url: https://wa.me/79639864491" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md

          # 袙褋褌邪胁谢褟械屑 褌胁芯懈 VIP 褋械褉胁械褉邪
          cat my_vip.txt >> README.md

          # 袙褋褌邪胁谢褟械屑 99 薪芯胁褘褏 褋械褉胁械褉芯胁
          IDX=1
          while IFS= read -r line; do
            RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
            echo "${line}#${RANDOM_FLAG} vpn - hwb 馃敆 $IDX" >> README.md
            IDX=$((IDX + 1))
          done < source_cleaned.txt

          # 5. 袨褌褔械褌 胁 Telegram
          if [[ -n "$TG_TOKEN" ]]; then
            TOTAL=$(grep -c "://" README.md)
            MSG="鈿旓笍 *袗袧孝袠袟袗袚袥校楔袣袗 袨袘袧袨袙袥袝袧袗*%0A%0A馃搳 袙褋械谐芯 褋械褉胁械褉芯胁: *$TOTAL*%0A馃晵 袙褉械屑褟: $(date +'%H:%M')"
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" -d "chat_id=$TG_CHAT_ID" -d "parse_mode=Markdown" -d "text=$MSG"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Updated with support links and 99 keys 鈿旓笍" || exit 0
          git push origin main
